<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/g360ia/assets/gestion360ia.ico" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaiA — La inteligencia de Gestión 360 iA</title>
<style>
  :root {
    --bg:#F8FAFB; --surface:#FFFFFF; --bg-soft:#F4F6F8; --bg-hover:#EEF2F6;
    --pr:#5C6E85; --pr-light:#8A9BAA; --pr-dark:#3A4A5C; --pr-bg:rgba(138,155,170,.10);
    --accent:#B08A55; --accent-light:#C8A870; --accent-bg:rgba(176,138,85,.10);
    --em:#1A7A4A; --em-light:#2ECC71; --em-bg:rgba(26,122,74,.10); --em-d:#1A6B3C;
    --text:#1E2A36; --text2:#3A4A5C; --sub:#7A8898; --muted:#9AAAB8;
    --white:#FFFFFF; --border:#E8ECF0; --border2:#D0D5DC;
    --grad-slate-v:linear-gradient(170deg,#7E8FA6,#3A4A5C);
    --grad-green:linear-gradient(135deg,#2ECC71,#1A7A4A);
    --grad-champ:linear-gradient(135deg,#E8C97A,#B08A55);
    --shadow-sm:0 1px 3px rgba(30,42,54,.07);
    --shadow-md:0 3px 10px rgba(30,42,54,.11);
    --shadow-lg:0 8px 24px rgba(30,42,54,.14);
    --r:0px;
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  .screen{
    font-family:'Segoe UI',system-ui,sans-serif;
    background:var(--bg);
    width:100%;height:100svh;min-height:400px;
    display:flex;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
  }

  canvas#bg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

  .frase-float{
    position:absolute;
    font-size:clamp(11px,1.3vw,13px);font-weight:500;
    letter-spacing:0.03em;line-height:1.5;
    color:rgba(58,74,92,0.62);
    opacity:0;transition:opacity 1s ease;
    z-index:20;pointer-events:none;white-space:nowrap;
    transform:translate(-50%,-50%);
  }
  .frase-float.gold{color:rgba(176,138,85,0.78);}
  .frase-float.green{color:rgba(26,122,74,0.65);}
  .frase-float.visible{opacity:1;}

  .center{position:relative;z-index:30;display:flex;flex-direction:column;align-items:center;gap:clamp(10px,2vh,18px);}
  .logo-wrap{animation:breathe 4s ease-in-out infinite;transform-origin:center;cursor:pointer;}
  @keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.10);}}
  .logo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr;gap:clamp(3px,.6vw,6px);width:clamp(56px,8vw,80px);height:clamp(56px,8vw,80px);}
  .lc{border-radius:3px;}
  .c1{background:#3b4f6b;}.c2{background:#5a7299;}.c3{background:#8fa5c2;}.c4{background:#d4a040;}.cx{background:transparent;}
  .maia-name{font-size:clamp(40px,8vw,64px);font-weight:200;letter-spacing:-0.03em;color:var(--text);line-height:1;display:flex;align-items:baseline;}
  .letter{display:inline-block;transition:all 0.6s cubic-bezier(0.34,1.56,0.64,1);}
  .letter.cap{font-weight:500;color:var(--pr-dark);}
  .letter.gcap{font-weight:500;color:var(--accent);}
  .maia-name.pop .l-m{transform:translateX(-4px) translateY(-3px) scale(1.08);}
  .maia-name.pop .l-a1{transform:translateX(-1px) translateY(3px) scale(1.05);}
  .maia-name.pop .l-i{transform:translateX(1px) translateY(-4px) scale(1.06);color:var(--accent);}
  .maia-name.pop .l-a2{transform:translateX(4px) translateY(2px) scale(1.09);}
  .maia-line{height:1px;background:linear-gradient(to right,transparent,var(--accent),transparent);width:0;transition:width 1.2s ease;margin-top:2px;}
  .maia-line.drawn{width:100%;}

  .hint-logo{position:absolute;bottom:clamp(36px,6vh,52px);left:0;right:0;text-align:center;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);z-index:20;animation:blink 2.5s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:0.3;}50%{opacity:0.9;}}
  .brand-foot{position:absolute;bottom:clamp(12px,2vh,20px);left:0;right:0;text-align:center;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);z-index:20;}
  .brand-foot span{color:var(--em);}

  /* overlay */
  .overlay{position:fixed;inset:0;z-index:100;background:rgba(30,42,54,0.45);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.35s ease;}
  .overlay.open{opacity:1;pointer-events:all;}

  /* popup */
  .popup{background:var(--surface);border:1px solid var(--border);width:min(500px,92vw);max-height:88svh;overflow-y:auto;position:relative;box-shadow:var(--shadow-lg);animation:popIn 0.35s cubic-bezier(0.34,1.3,0.64,1) forwards;display:flex;flex-direction:column;}
  @keyframes popIn{from{transform:scale(0.94) translateY(10px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}

  .popup-header{background:var(--grad-slate-v);padding:20px 24px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .popup-header-brand{display:flex;align-items:center;gap:10px;}
  .popup-header-logo{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr;gap:3px;width:28px;height:28px;}
  .plc{border-radius:2px;}
  .ph-c1{background:rgba(255,255,255,0.35);}.ph-c2{background:rgba(255,255,255,0.55);}.ph-c4{background:#d4a040;}.ph-cx{background:transparent;}
  .popup-header-name{font-size:18px;font-weight:200;color:#fff;letter-spacing:-0.02em;}
  .popup-header-name span{font-weight:500;color:#E8C97A;}
  .popup-close{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.4);font-size:16px;line-height:1;transition:color 0.2s;padding:4px;}
  .popup-close:hover{color:rgba(255,255,255,0.85);}

  .popup-body{padding:clamp(20px,4vw,32px);}
  .pstep{animation:fadeUp 0.4s ease forwards;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  .pdots{display:flex;gap:5px;margin-bottom:20px;}
  .pdot{width:20px;height:3px;background:var(--border2);transition:background 0.3s;}
  .pdot.on{background:var(--em);}

  .p-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--em);margin-bottom:10px;font-weight:400;}
  .p-title{font-size:clamp(17px,3vw,22px);font-weight:300;color:var(--text);line-height:1.35;margin-bottom:6px;letter-spacing:-0.01em;}
  .p-sub{font-size:13px;color:var(--sub);margin-bottom:24px;font-weight:300;}

  .lbar{height:2px;background:var(--border);margin-top:20px;overflow:hidden;}
  .lbar-fill{height:100%;width:0;background:var(--grad-green);transition:width 1.8s ease;}

  .opciones{display:flex;flex-direction:column;gap:6px;}
  .opcion{padding:11px 16px;background:var(--bg-soft);border:1px solid var(--border);color:var(--text2);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:400;cursor:pointer;text-align:left;transition:all 0.18s;}
  .opcion:hover{background:var(--em-bg);border-color:var(--em);color:var(--em-d);}

  .dots{display:flex;gap:7px;justify-content:center;margin:20px 0;}
  .dot-a{width:6px;height:6px;border-radius:50%;background:var(--em);animation:pulse 1.2s ease-in-out infinite;}
  .dot-a:nth-child(2){animation-delay:0.2s;}.dot-a:nth-child(3){animation-delay:0.4s;}
  @keyframes pulse{0%,100%{opacity:0.2;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}

  .tag-detectado{display:inline-block;padding:3px 10px;background:var(--em-bg);border:1px solid rgba(26,122,74,0.2);font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--em);margin-bottom:12px;}
  .r-title{font-size:clamp(15px,2.5vw,19px);font-weight:400;color:var(--text);line-height:1.4;margin-bottom:10px;}
  .r-body{font-size:13px;color:var(--sub);line-height:1.75;margin-bottom:20px;font-weight:300;}
  .gerentes-label{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;font-weight:400;}
  .gerentes{display:flex;flex-direction:column;gap:6px;margin-bottom:20px;}
  .gerente{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:var(--bg-soft);border-left:3px solid var(--accent);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
  .gerente-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
  .gerente-rol{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:3px;font-weight:500;}
  .gerente-desc{font-size:12px;color:var(--sub);line-height:1.55;font-weight:300;}
  .sep-line{height:1px;background:var(--border);margin:18px 0;}
  .cierre-main{font-size:clamp(15px,2.5vw,19px);font-weight:300;color:var(--pr-light);line-height:1.4;text-align:center;}
  .cierre-main em{font-style:normal;color:var(--text);font-weight:400;}
  .cierre-sub{font-size:12px;color:var(--muted);text-align:center;margin-top:5px;font-weight:300;}

  .cta-grupo{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;}
  .btn-champ{flex:1;padding:13px 20px;background:var(--grad-champ);color:#fff;font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;border:none;cursor:pointer;box-shadow:var(--shadow-sm);transition:filter 0.2s;}
  .btn-champ:hover{filter:brightness(1.08);}

  /* ── Formulario pedido anticipado ── */
  .form-lead{display:flex;flex-direction:column;gap:14px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:400px){.form-row{grid-template-columns:1fr;}}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  .form-group label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--sub);font-weight:400;}
  .form-group label .req{color:var(--accent);}
  .form-group input{
    padding:10px 12px;
    background:var(--bg-soft);
    border:1px solid var(--border);
    border-radius:0;
    font-family:'Segoe UI',system-ui,sans-serif;
    font-size:13px;
    color:var(--text);
    outline:none;
    transition:border-color 0.18s,background 0.18s;
    width:100%;
  }
  .form-group input:focus{border-color:var(--pr);background:var(--white);}
  .form-group input::placeholder{color:var(--muted);font-size:12px;}
  .form-group input.error{border-color:#c0392b;}
  .btn-submit{
    width:100%;padding:14px 20px;
    background:var(--grad-champ);color:#fff;
    font-family:'Segoe UI',system-ui,sans-serif;
    font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;
    border:none;cursor:pointer;
    box-shadow:var(--shadow-sm);
    transition:filter 0.2s,opacity 0.2s;
    margin-top:6px;
  }
  .btn-submit:hover{filter:brightness(1.08);}
  .btn-submit:disabled{opacity:0.55;cursor:default;filter:none;}
  .form-error{font-size:11px;color:#c0392b;margin-top:-6px;}

  /* ── Éxito ── */
  .success-wrap{text-align:center;padding:16px 0 8px;}
  .success-icon{font-size:38px;margin-bottom:14px;}
  .success-title{font-size:clamp(16px,2.8vw,20px);font-weight:300;color:var(--text);line-height:1.4;margin-bottom:8px;}
  .success-title em{font-style:normal;color:var(--em);font-weight:500;}
  .success-sub{font-size:13px;color:var(--sub);font-weight:300;line-height:1.65;}
</style>
</head>
<body>

<div class="screen" id="mainScreen">
  <canvas id="bg"></canvas>
  <div id="fc"></div>
  <div class="center">
    <div class="logo-wrap" id="logoWrap">
      <div class="logo-grid">
        <div class="lc c1"></div><div class="lc c2"></div><div class="lc c4"></div>
        <div class="lc c2"></div><div class="lc c3"></div><div class="lc cx"></div>
        <div class="lc c3"></div><div class="lc cx"></div><div class="lc cx"></div>
      </div>
    </div>
    <div class="maia-name" id="maiaName">
      <span class="letter cap l-m">M</span><span class="letter l-a1">a</span><span class="letter l-i">i</span><span class="letter gcap l-a2">A</span>
    </div>
    <div class="maia-line" id="maiaLine"></div>
  </div>
  <div class="hint-logo">Tocá el logo</div>
  <div class="brand-foot"><span>G360</span>ia · gestion360ia.com.ar</div>
</div>

<div class="overlay" id="overlay">
  <div class="popup" id="popup">
    <div class="popup-header">
      <div class="popup-header-brand">
        <div class="popup-header-logo">
          <div class="plc ph-c1"></div><div class="plc ph-c2"></div><div class="plc ph-c4"></div>
          <div class="plc ph-c2"></div><div class="plc ph-c2"></div><div class="plc ph-cx"></div>
          <div class="plc ph-c2"></div><div class="plc ph-cx"></div><div class="plc ph-cx"></div>
        </div>
        <div class="popup-header-name">Mai<span>A</span></div>
      </div>
      <button class="popup-close" id="popupClose">✕</button>
    </div>
    <div class="popup-body" id="popContent"></div>
  </div>
</div>

<script>
// ── CANVAS ──────────────────────────────────────
const canvas=document.getElementById('bg'),ctx=canvas.getContext('2d'),ms=document.getElementById('mainScreen');
let W,H,CX,CY,SAFE_W,SAFE_H;

function resize(){
  W=ms.offsetWidth; H=ms.offsetHeight;
  canvas.width=W; canvas.height=H;
  CX=W/2; CY=H/2;
  SAFE_W=Math.min(W*0.45,280);
  SAFE_H=Math.min(H*0.35,200);
}
resize(); window.addEventListener('resize',resize);

const nodes=Array.from({length:44},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.09,vy:(Math.random()-.5)*.09,r:Math.random()*1.8+.5,a:Math.random()*.4+.1,aDir:Math.random()>.5?1:-1,aSpd:Math.random()*.0015+.0003}));

function tick(){
  ctx.clearRect(0,0,W,H);
  for(const n of nodes){
    n.a+=n.aDir*n.aSpd; if(n.a>.5){n.a=.5;n.aDir=-1;} if(n.a<.04){n.a=.04;n.aDir=1;}
    n.x+=n.vx; n.y+=n.vy;
    if(n.x<0)n.x=W; if(n.x>W)n.x=0; if(n.y<0)n.y=H; if(n.y>H)n.y=0;
  }
  for(let i=0;i<44;i++) for(let j=i+1;j<44;j++){
    const a=nodes[i],b=nodes[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<135){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(92,110,133,${(1-d/135)*.06})`;ctx.lineWidth=.5;ctx.stroke();}
  }
  for(const n of nodes){ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle=`rgba(92,110,133,${n.a*.25})`;ctx.fill();}
  requestAnimationFrame(tick);
}
tick();

// ── MAIA ANIM ──
const maiaName=document.getElementById('maiaName');
setTimeout(()=>document.getElementById('maiaLine').classList.add('drawn'),600);
function popMaia(){maiaName.classList.add('pop');setTimeout(()=>maiaName.classList.remove('pop'),1200);}
setTimeout(()=>{popMaia();setInterval(popMaia,5000);},2000);

// ── FRASES ──
const todas=[
  {txt:"No te responde. Actúa.",c:"gold"},
  {txt:"Las otras IA esperan. MaiA ya trabaja.",c:""},
  {txt:"No la usás. Ella trabaja.",c:"gold"},
  {txt:"Las otras IA contestan preguntas. MaiA toma decisiones.",c:""},
  {txt:"No es un bot. Es tu equipo.",c:"green"},
  {txt:"No es software. Es inteligencia.",c:""},
  {txt:"Un gerente por cada área. Siempre activo.",c:"green"},
  {txt:"Asistente. Agente. MaiA. El siguiente nivel.",c:"gold"},
  {txt:"El futuro de los negocios ya tiene nombre.",c:"gold"},
  {txt:"Esto es lo que viene. Para todos.",c:""},
  {txt:"Primero en entender, primero en crecer.",c:"green"},
  {txt:"Los negocios que no piensen solos, van a quedar atrás.",c:""},
  {txt:"Tu competencia todavía no sabe qué es esto.",c:"gold"},
  {txt:"Menos que un empleado. Más que un equipo.",c:"green"},
  {txt:"El software a medida no piensa. MaiA sí.",c:""},
  {txt:"No contratás personas. Activás inteligencia.",c:"gold"},
  {txt:"Por lo que pagás un mes, MaiA trabaja todo el año.",c:""},
  {txt:"Mientras vos trabajás, MaiA analiza.",c:""},
  {txt:"Dejá de manejar tu negocio solo.",c:""},
  {txt:"MaiA piensa tu negocio todos los días.",c:"green"},
  {txt:"Analiza. Decide. Actúa.",c:"gold"},
  {txt:"MaiA no duerme. Tu negocio tampoco debería.",c:""},
  {txt:"Lo que no ves, MaiA sí.",c:"gold"},
  {txt:"Decidir mejor cambia todo.",c:"green"},
];

const fc=document.getElementById('fc');
let usados=[];

function sigFrase(){
  if(usados.length>=todas.length) usados=[];
  const disp=todas.filter((_,i)=>!usados.includes(i));
  const picked=disp[Math.floor(Math.random()*disp.length)];
  usados.push(todas.indexOf(picked));
  return picked;
}

function posAl(txtLen){
  const estimatedW=txtLen*7.5;
  const halfW=estimatedW/2+16;
  const halfH=12;
  for(let t=0;t<60;t++){
    const angle=Math.random()*Math.PI*2;
    const rMin=Math.min(W,H)*0.22;
    const rMax=Math.min(W,H)*0.42;
    const r=rMin+Math.random()*(rMax-rMin);
    const x=CX+Math.cos(angle)*r;
    const y=CY+Math.sin(angle)*r;
    const enZonaX=Math.abs(x-CX)<(SAFE_W/2+halfW);
    const enZonaY=Math.abs(y-CY)<(SAFE_H/2+halfH);
    if(enZonaX&&enZonaY) continue;
    if(x-halfW<12||x+halfW>W-12) continue;
    if(y-halfH<12||y+halfH>H-32) continue;
    return {x,y};
  }
  return [{x:CX,y:CY-SAFE_H*0.85},{x:CX,y:CY+SAFE_H*0.85}][Math.floor(Math.random()*2)];
}

const SHOW_MS=2400,FADE_MS=1000,CYCLE_MS=3600;

function cicloFrase(){
  const f=sigFrase();
  const pos=posAl(f.txt.length);
  const el=document.createElement('div');
  el.className='frase-float'+(f.c?' '+f.c:'');
  el.textContent=f.txt;
  el.style.left=pos.x+'px';
  el.style.top=pos.y+'px';
  fc.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('visible')));
  setTimeout(()=>{
    el.classList.remove('visible');
    setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el);},FADE_MS+50);
  },SHOW_MS);
}

cicloFrase();
setInterval(cicloFrase,CYCLE_MS);

// ── POPUP ──
const overlay=document.getElementById('overlay'),popContent=document.getElementById('popContent');
let respuestas={};
function abrirPopup(){overlay.classList.add('open');mostrarIntro();}
function cerrarPopup(){overlay.classList.remove('open');respuestas={};}
document.getElementById('logoWrap').addEventListener('click',abrirPopup);
document.getElementById('popupClose').addEventListener('click',cerrarPopup);
overlay.addEventListener('click',(e)=>{if(e.target===overlay)cerrarPopup();});

function render(html){popContent.innerHTML=html;}
function pdots(p){return`<div class="pdots">${[1,2,3].map(i=>`<div class="pdot${i<=p?' on':''}"></div>`).join('')}</div>`;}

function mostrarIntro(){
  render(`<div class="pstep">
    <div class="p-label">Inteligencia aplicada a negocios</div>
    <div class="p-title">"Voy a entender tu negocio."</div>
    <div class="p-sub">Solo necesito 3 respuestas.</div>
    <div class="lbar"><div class="lbar-fill" id="lb"></div></div>
  </div>`);
  setTimeout(()=>{const lb=document.getElementById('lb');if(lb)lb.style.width='100%';},80);
  setTimeout(mostrarP1,2000);
}

function mostrarP1(){
  render(`<div class="pstep">
    ${pdots(1)}
    <div class="p-label">Pregunta 1 de 3</div>
    <div class="p-title">¿Qué tipo de negocio tenés?</div>
    <div class="opciones">
      <button class="opcion" onclick="elegirTipo('Ventas — productos físicos o stock')">🛍 Ventas / productos</button>
      <button class="opcion" onclick="elegirTipo('Servicios profesionales o técnicos')">🤝 Servicios</button>
      <button class="opcion" onclick="elegirTipo('Negocio online — redes sociales o e-commerce')">📱 Online / redes</button>
      <button class="opcion" onclick="elegirTipo('Gastronomía o atención al público')">🍽 Gastronomía / local</button>
      <button class="opcion" onclick="elegirTipo('Otro tipo de negocio')">✦ Otro</button>
    </div>
  </div>`);
}
window.elegirTipo=function(v){respuestas.tipo=v;mostrarP2();}

function mostrarP2(){
  render(`<div class="pstep">
    ${pdots(2)}
    <div class="p-label">Pregunta 2 de 3</div>
    <div class="p-title">¿Qué te preocupa hoy?</div>
    <div class="opciones">

async function llamarMaia(){
  const prompt=`Sos MaiA, la inteligencia de negocio de Gestión 360 IA. Actuás como un equipo de gerentes expertos activados específicamente para este negocio.

El usuario respondió:
- Tipo de negocio: ${respuestas.tipo}
- Principal preocupación: ${respuestas.problema}
- Quiere mejorar primero: ${respuestas.meta}

Tu objetivo: mostrarle que MaiA ES un equipo de gerentes digitales expertos que trabaja de forma autónoma. No hablés de software ni tecnología. Hablá de acción real y autónoma.

Respondé con este JSON exacto (sin markdown, sin backticks):
{
  "deteccion": "Diagnóstico directo y breve del negocio",
  "descripcion": "2 oraciones empáticas sobre su situación real. Empezá con 'Probablemente'.",
  "gerentes": [
    { "icono": "📊", "rol": "Nombre del rol", "accion": "Qué haría MaiA autónomamente, específico para su negocio" },
    { "icono": "📣", "rol": "Nombre del rol", "accion": "Acción autónoma específica" },
    { "icono": "🤝", "rol": "Nombre del rol", "accion": "Acción autónoma específica" },
    { "icono": "📋", "rol": "Nombre del rol", "accion": "Acción autónoma específica" }
  ],
  "cierre": "Frase final poderosa. MaiA no duerme, siempre activa.",
  "subcierre": "Una línea secundaria íntima y directa al usuario"
}

Elegí los roles MÁS relevantes para su rubro y problema. Podés usar: Gerente de Ventas, Redes, Clientes, Marketing, Operaciones, Inventario, Turnos, Cobros, Comunicación, etc. Máximo 4 gerentes.`;

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    const raw=data.content.map(c=>c.text||'').join('');
    const json=JSON.parse(raw.replace(/```json|```/g,'').trim());
    mostrarRespuesta(json);
  }catch(e){
    mostrarRespuesta({
      deteccion:"Tu negocio necesita un equipo que trabaje cuando vos no podés.",
      descripcion:"Probablemente estás tomando decisiones solo, sin datos, y el día a día no te deja tiempo para pensar en crecer. Eso tiene solución.",
      gerentes:[
        {icono:"📊",rol:"Gerente de Ventas",accion:"Detecta en qué momento perdés ventas y ejecuta acciones de recuperación sin que vos intervengas."},
        {icono:"📣",rol:"Gerente de Marketing",accion:"Publica, programa y ajusta tu presencia digital según lo que funciona en tu rubro."},
        {icono:"🤝",rol:"Gerente de Clientes",accion:"Hace seguimiento automático, detecta quién no volvió y toma contacto por vos."},
        {icono:"📋",rol:"Gerente de Operaciones",accion:"Ordena tus procesos, te avisa cuando algo falla y sugiere mejoras cada semana."}
      ],
      cierre:"MaiA no duerme. Tu negocio tampoco debería.",
      subcierre:"Mientras vos descansás, MaiA sigue trabajando."
    });
  }
}

function mostrarRespuesta(d){
  const gerentesHTML=d.gerentes.map(g=>`
    <div class="gerente">
      <div class="gerente-icon">${g.icono}</div>
      <div>
        <div class="gerente-rol">${g.rol}</div>
        <div class="gerente-desc">${g.accion}</div>
      </div>
    </div>`).join('');
  render(`<div class="pstep">
    <div class="tag-detectado">MaiA detectó →</div>
    <div class="r-title">${d.deteccion}</div>
    <div class="r-body">${d.descripcion}</div>
    <div class="gerentes-label">Los gerentes que MaiA activaría para tu negocio</div>
    <div class="gerentes">${gerentesHTML}</div>
    <div class="sep-line"></div>
    <div class="cierre-main">Eso es <em>MaiA</em>.</div>
    <div class="cierre-sub">${d.cierre}</div>
    <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:3px;">${d.subcierre}</div>
    <div class="cta-grupo">
      <button class="btn-champ" onclick="mostrarFormulario()">Pedido anticipado →</button>
    </div>
  </div>`);
}

window.mostrarFormulario = function(){
  render(`<div class="pstep">
    <div class="p-label">Acceso anticipado</div>
    <div class="p-title">Reservá tu lugar</div>
    <div class="p-sub" style="margin-bottom:20px;">Te contactamos en cuanto MaiA esté lista para tu negocio.</div>
    <form class="form-lead" id="formLead" onsubmit="enviarFormulario(event)" novalidate>
      <div class="form-group">
        <label>Rubro <span class="req">*</span></label>
        <input type="text" id="f-rubro" placeholder="Ej: Ferretería, Estudio contable, Ropa…" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Teléfono <span class="req">*</span></label>
          <input type="tel" id="f-telefono" placeholder="+54 9 11 0000-0000" required>
        </div>
        <div class="form-group">
          <label>Email <span class="req">*</span></label>
          <input type="email" id="f-email" placeholder="tu@email.com" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Localidad <span class="req">*</span></label>
          <input type="text" id="f-localidad" placeholder="Ej: Rosario" required>
        </div>
        <div class="form-group">
          <label>País <span class="req">*</span></label>
          <input type="text" id="f-pais" placeholder="Argentina" value="Argentina" required>
        </div>
      </div>
      <div class="form-group">
        <label>Sitio web <span style="color:var(--muted);font-weight:300;text-transform:none;letter-spacing:0;">(opcional)</span></label>
        <input type="text" id="f-web" placeholder="www.tunegocio.com">
      </div>
      <div class="form-group">
        <label>Red social <span style="color:var(--muted);font-weight:300;text-transform:none;letter-spacing:0;">(opcional)</span></label>
        <input type="text" id="f-redes" placeholder="@tunegocio o link de Instagram/Facebook">
      </div>
      <div id="form-err" class="form-error" style="display:none;"></div>
      <button type="submit" class="btn-submit" id="btnSubmit">Quiero acceso anticipado →</button>
    </form>
  </div>`);
};

window.enviarFormulario = async function(e){
  e.preventDefault();
  const rubro     = document.getElementById('f-rubro').value.trim();
  const telefono  = document.getElementById('f-telefono').value.trim();
  const email     = document.getElementById('f-email').value.trim();
  const localidad = document.getElementById('f-localidad').value.trim();
  const pais      = document.getElementById('f-pais').value.trim() || 'Argentina';
  const web       = document.getElementById('f-web').value.trim();
  const redes     = document.getElementById('f-redes').value.trim();
  const errEl     = document.getElementById('form-err');
  const btnEl     = document.getElementById('btnSubmit');

  // Limpiar errores previos
  ['f-rubro','f-telefono','f-email','f-localidad'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.remove('error');
  });
  errEl.style.display='none';

  // Validación
  const camposVacios = ['f-rubro','f-telefono','f-email','f-localidad'].filter(id=>{
    const el=document.getElementById(id);
    return el && !el.value.trim();
  });
  if(camposVacios.length){
    camposVacios.forEach(id=>document.getElementById(id).classList.add('error'));
    errEl.textContent='Por favor completá los campos obligatorios.';
    errEl.style.display='block';
    return;
  }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    document.getElementById('f-email').classList.add('error');
    errEl.textContent='El email no parece válido.';
    errEl.style.display='block';
    return;
  }

  btnEl.disabled=true;
  btnEl.textContent='Enviando…';

  try{
    const res = await fetch('https://admin.gestion360ia.com.ar/api/public/maia-lead',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        rubro, telefono, email, localidad, pais,
        web: web||null,
        redes: redes||null,
        tipo_negocio: respuestas.tipo||null,
        problema: respuestas.problema||null,
        meta: respuestas.meta||null,
      })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||'Error al enviar');
    mostrarExito();
  }catch(err){
    btnEl.disabled=false;
    btnEl.textContent='Quiero acceso anticipado →';
    errEl.textContent='Hubo un error al enviar. Intentá de nuevo.';
    errEl.style.display='block';
  }
};

function mostrarExito(){
  render(`<div class="pstep">
    <div class="success-wrap">
      <div class="success-icon">✦</div>
      <div class="success-title">Te estaremos contactando en <em>poco tiempo</em>.</div>
      <div class="success-sub">Estate atento a tus emails.<br><br>MaiA ya sabe quién sos.</div>
    </div>
  </div>`);
}
</script>
